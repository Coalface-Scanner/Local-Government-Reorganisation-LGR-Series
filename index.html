    <!-- Google tag (gtag.js) - Deferred for performance and respects cookie consent -->
    <script>
      // Initialize dataLayer
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      // Check cookie consent before loading analytics
      function checkConsentAndLoadAnalytics() {
        const consent = localStorage.getItem('lgr-cookie-consent');
        if (consent) {
          try {
            const consentData = JSON.parse(consent);
            if (consentData.analytics === true) {
              loadGoogleAnalytics();
            }
          } catch (e) {
            // If consent data is invalid, don't load analytics
            console.warn('Invalid consent data, analytics not loaded');
          }
        }
        // If no consent, analytics will not load until user accepts
      }

      function loadGoogleAnalytics() {
        var script = document.createElement('script');
        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-1CQR5MEY37';
        document.head.appendChild(script);
        script.onload = function() {
          gtag('js', new Date());
          gtag('config', 'G-1CQR5MEY37');
        };
      }

      // Check consent on page load
      window.addEventListener('load', checkConsentAndLoadAnalytics);

      // Listen for consent changes (when user accepts/rejects)
      window.addEventListener('storage', function(e) {
        if (e.key === 'lgr-cookie-consent') {
          checkConsentAndLoadAnalytics();
        }
      });
    </script>
