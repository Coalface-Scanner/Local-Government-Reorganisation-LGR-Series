# netlify.toml
# ============================================================
# Merge with your existing config. Your public/_redirects file
# will still work — Netlify uses both. Just make sure the SPA
# fallback (/* → /index.html 200) is in one or the other.
# ============================================================

[build]
  command = "npm run build"
  publish = "dist"

# ── HEADERS ────────────────────────────────────────────────

# Security baseline
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Block admin pages from indexing via HTTP header
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Cache Vite's hashed assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML must revalidate so crawlers get latest pre-rendered version
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sitemap: short cache
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
